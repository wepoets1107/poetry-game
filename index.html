<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗词猜句小游戏</title>
<script src="poems.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif SC", serif;
  background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  background: rgba(255,252,245,0.95);
  border-radius: 20px;
  padding: 30px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  border: 1px solid rgba(200,180,160,0.3);
}
.header {
  text-align: center;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 24px;
  color: #5d4037;
  letter-spacing: 4px;
  font-weight: normal;
}
.header p {
  color: #8d6e63;
  font-size: 14px;
  margin-top: 6px;
}
.score-bar {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #d7ccc8;
  margin-bottom: 20px;
  color: #6d4c41;
  font-size: 14px;
}
.poem-info {
  text-align: center;
  margin-bottom: 16px;
}
.poem-title {
  font-size: 20px;
  color: #4e342e;
  letter-spacing: 2px;
}
.poem-author {
  font-size: 14px;
  color: #8d6e63;
  margin-top: 4px;
}
.card-area {
  position: relative;
}
.card {
  display: none;
  animation: fadeIn 0.4s ease;
  position: relative;
}
.card.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.hint-box {
  background: #fff8e1;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 16px;
  border-left: 3px solid #ffb300;
  font-size: 14px;
  color: #6d4c41;
  line-height: 1.6;
}
.hint-box .label {
  font-weight: bold;
  color: #f57f17;
  margin-right: 6px;
}
.blank-line {
  background: #fafafa;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 1px solid #e0d5c8;
  font-size: 18px;
  text-align: center;
  letter-spacing: 3px;
  line-height: 1.8;
  cursor: pointer;
  transition: all 0.2s;
  color: #3e2723;
}
.blank-line:hover {
  border-color: #a1887f;
  background: #f5f0e8;
}
.blank-line.selected {
  border-color: #ff8a65;
  background: #fff3e0;
  box-shadow: 0 0 0 2px rgba(255,138,101,0.2);
}
.blank-line.correct {
  border-color: #66bb6a;
  background: #e8f5e9;
}
.blank-line.wrong {
  animation: shake 0.4s ease;
  border-color: #ef5350;
  background: #ffebee;
}
.blank-line .blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 2px dashed #bdbdbd;
  color: #c62828;
  font-weight: bold;
}
.blank-line .filled {
  display: inline-block;
  min-width: 80px;
  color: #2e7d32;
  font-weight: bold;
}
.blank-line .empty-part {
  color: #999;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.option-btn {
  padding: 12px;
  border: 1px solid #d7ccc8;
  border-radius: 10px;
  background: #fafafa;
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  color: #4e342e;
  letter-spacing: 1px;
}
.option-btn:hover {
  background: #efebe9;
  border-color: #a1887f;
  transform: translateY(-1px);
}
.option-btn:active {
  transform: translateY(0);
}
.option-btn.selected-opt {
  background: #fff3e0;
  border-color: #ff8a65;
}
.option-btn.correct-opt {
  background: #e8f5e9;
  border-color: #66bb6a;
}
.option-btn.wrong-opt {
  background: #ffebee;
  border-color: #ef5350;
}
.option-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.action-btns {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}
.btn-primary {
  background: linear-gradient(135deg, #8d6e63, #6d4c41);
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: #efebe9;
  color: #5d4037;
  border: 1px solid #d7ccc8;
}
.btn-secondary:hover { background: #d7ccc8; }
.feedback {
  margin-top: 14px;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 15px;
  display: none;
}
.feedback.show { display: block; }
.feedback.success { background: #e8f5e9; color: #2e7d32; }
.feedback.error { background: #ffebee; color: #c62828; }
.feedback.info { background: #e3f2fd; color: #1565c0; }
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 16px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #d7ccc8;
  transition: all 0.3s;
}
.dot.active { background: #6d4c41; transform: scale(1.3); }
.dot.done { background: #66bb6a; }
.dot.skipped { background: #bdbdbd; }
.result-screen {
  display: none;
  text-align: center;
  padding: 20px 0;
}
.result-screen.active { display: block; }
.result-title {
  font-size: 28px;
  color: #4e342e;
  margin-bottom: 8px;
}
.result-score {
  font-size: 48px;
  color: #6d4c41;
  margin: 16px 0;
}
.result-detail {
  text-align: left;
  margin: 16px 0;
  max-height: 300px;
  overflow-y: auto;
  padding: 10px;
  background: #fafafa;
  border-radius: 8px;
}
.result-item { padding: 6px 0; border-bottom: 1px solid #efebe9; font-size: 14px; }
.result-item:last-child { border: none; }
.result-item .ri-correct { color: #2e7d32; }
.result-item .ri-wrong { color: #c62828; }
.hint-toggle {
  text-align: right;
  margin-bottom: 8px;
}
.hint-toggle button {
  background: none;
  border: none;
  color: #8d6e63;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  text-decoration: underline;
  padding: 4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📜 诗词猜句</h1>
    <p>补全诗句中的空白，看看你能对多少</p>
  </div>

  <!-- 游戏区域 -->
  <div id="gameScreen">
    <div class="score-bar">
      <span>第 <span id="currentNum">1</span>/<span id="totalNum">10</span> 题</span>
      <span>✅ <span id="correctCount">0</span>  ❌ <span id="wrongCount">0</span>  ⏭ <span id="skipCount">0</span></span>
    </div>

    <div class="poem-info">
      <div class="poem-title" id="poemTitle"></div>
      <div class="poem-author" id="poemAuthor"></div>
    </div>

    <div class="hint-toggle">
      <button id="hintToggleBtn">💡 查看提示</button>
    </div>
    <div class="hint-box" id="hintBox" style="display:none;">
      <span class="label">💡 提示：</span><span id="hintText"></span>
    </div>

    <div id="cardContainer"></div>

    <div class="action-btns">
      <button class="btn btn-primary" id="submitBtn" disabled>提交答案</button>
      <button class="btn btn-secondary" id="skipBtn">跳过此题</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="progress-dots" id="progressDots"></div>
  </div>

  <!-- 结算页面 -->
  <div class="result-screen" id="resultScreen">
    <div class="result-title">🏆 答题结束！</div>
    <div class="result-score" id="finalScore"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn btn-primary" onclick="restartGame()" style="margin-top:12px;">再来一局</button>
  </div>
</div>

<script>
const allPoems = [...poems, ...extraPoems];
const TOTAL = 10;
let gamePoems = [];
let currentIndex = 0;
let correctCount = 0, wrongCount = 0, skipCount = 0;
let currentBlankLine = null;
let selectedOption = null;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame() {
  gamePoems = shuffle([...allPoems]).slice(0, TOTAL);
  gamePoems.forEach(p => {
    if (p.lines.length > 2) {
      // pick a random line to blank out (not first line for harder? mix it up)
      const pick = Math.floor(Math.random() * p.lines.length);
      p.blankIndex = pick;
      p.answer = p.lines[pick];
    } else {
      p.blankIndex = 0;
      p.answer = p.lines[0];
    }
  });
  currentIndex = 0;
  correctCount = 0; wrongCount = 0; skipCount = 0;
  answered = false;
  selectedOption = null;
  currentBlankLine = null;
  showGame();
}

function showGame() {
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('active');
  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= TOTAL) {
    showResult();
    return;
  }

  const poem = gamePoems[currentIndex];
  answered = false;
  selectedOption = null;
  currentBlankLine = null;

  document.getElementById('currentNum').textContent = currentIndex + 1;
  document.getElementById('totalNum').textContent = TOTAL;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('skipCount').textContent = skipCount;
  document.getElementById('poemTitle').textContent = `《${poem.title}》`;
  document.getElementById('poemAuthor').textContent = poem.author;
  document.getElementById('hintText').textContent = poem.hints[Math.floor(Math.random() * poem.hints.length)];
  document.getElementById('hintBox').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('submitBtn').disabled = true;

  // Render lines
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  container.className = 'card active';

  poem.lines.forEach((line, idx) => {
    const div = document.createElement('div');
    div.className = 'blank-line';
    div.dataset.index = idx;

    if (idx === poem.blankIndex) {
      // Show partial: give first character and character count
      const firstChar = line[0];
      const restLen = line.length - 1;
      div.innerHTML = `<span class="empty-part">${firstChar}</span><span class="blank">（${restLen}字）</span>`;
      div.dataset.blank = 'true';
      div.addEventListener('click', () => selectBlankLine(div));
    } else {
      div.textContent = line;
    }
    container.appendChild(div);
  });

  // Generate options (1 correct + 3 distractors)
  const options = generateOptions(poem);
  const optGrid = document.createElement('div');
  optGrid.className = 'options-grid';
  optGrid.id = 'optionsGrid';

  shuffle(options).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.dataset.value = opt;
    btn.dataset.index = i;
    btn.addEventListener('click', () => selectOption(btn));
    optGrid.appendChild(btn);
  });
  container.appendChild(optGrid);

  // Progress dots
  renderDots();
}

function generateOptions(poem) {
  const correct = poem.answer;
  const distractors = new Set();
  // Get wrong options from other poems
  const pool = allPoems.flatMap(p => p.lines.filter(l => l !== correct));
  const shuffledPool = shuffle(pool);
  for (const line of shuffledPool) {
    if (distractors.size >= 3) break;
    if (line.length === correct.length && !distractors.has(line)) {
      distractors.add(line);
    }
  }
  // If not enough same-length, pad with any
  for (const line of shuffledPool) {
    if (distractors.size >= 3) break;
    if (!distractors.has(line)) distractors.add(line);
  }
  return [correct, ...distractors];
}

function selectBlankLine(el) {
  if (answered) return;
  document.querySelectorAll('.blank-line').forEach(l => l.classList.remove('selected'));
  el.classList.add('selected');
  currentBlankLine = el;
}

function selectOption(btn) {
  if (answered) return;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('selected-opt');
  });
  btn.classList.add('selected-opt');
  selectedOption = btn.dataset.value;
  document.getElementById('submitBtn').disabled = false;
}

document.getElementById('submitBtn').addEventListener('click', submitAnswer);

function submitAnswer() {
  if (!selectedOption || answered) return;

  const poem = gamePoems[currentIndex];
  const correct = poem.answer;
  answered = true;

  const blankLines = document.querySelectorAll('.blank-line');
  const blankEl = blankLines[poem.blankIndex];
  const options = document.querySelectorAll('.option-btn');

  // Mark options
  options.forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.value === correct) btn.classList.add('correct-opt');
    if (btn.dataset.value === selectedOption && btn.dataset.value !== correct) btn.classList.add('wrong-opt');
  });

  const fb = document.getElementById('feedback');
  if (selectedOption === correct) {
    correctCount++;
    blankEl.className = 'blank-line correct';
    blankEl.innerHTML = `<span class="filled">${correct}</span>`;
    fb.className = 'feedback success show';
    fb.textContent = '✅ 正确！';
  } else {
    wrongCount++;
    blankEl.className = 'blank-line wrong';
    blankEl.innerHTML = `<span class="filled" style="color:#c62828;">${selectedOption}</span>`;
    fb.className = 'feedback error show';
    fb.textContent = `❌ 正确答案：「${correct}」`;
  }

  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('submitBtn').disabled = true;

  // Auto advance after delay
  setTimeout(() => nextQuestion(), 1500);
}

document.getElementById('skipBtn').addEventListener('click', () => {
  if (answered) return;
  skipCount++;
  document.getElementById('skipCount').textContent = skipCount;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback info show';
  const poem = gamePoems[currentIndex];
  fb.textContent = `⏭ 已跳过，正确答案：「${poem.answer}」`;
  answered = true;
  // Show answer in blank
  const blankLines = document.querySelectorAll('.blank-line');
  const blankEl = blankLines[poem.blankIndex];
  blankEl.innerHTML = `<span class="filled" style="color:#1565c0;">${poem.answer}</span>`;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  document.getElementById('submitBtn').disabled = true;
  setTimeout(() => nextQuestion(), 1200);
});

function nextQuestion() {
  currentIndex++;
  renderQuestion();
}

function renderDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (i === currentIndex) dot.classList.add('active');
    else if (i < currentIndex) dot.classList.add('done');
    container.appendChild(dot);
  }
}

function showResult() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('resultScreen').classList.add('active');
  const total = correctCount + wrongCount + skipCount;
  const score = Math.round((correctCount / Math.max(total,1)) * 100);
  document.getElementById('finalScore').innerHTML = `${correctCount}/${TOTAL}<br><span style="font-size:20px;color:#8d6e63;">正确率 ${score}%</span>`;

  let grade = '🌱';
  if (score >= 90) grade = '🏅 诗词大师！';
  else if (score >= 70) grade = '📚 诗词达人！';
  else if (score >= 50) grade = '📖 还需努力~';
  else grade = '🌱 多读点诗呀~';

  const detail = document.getElementById('resultDetail');
  detail.innerHTML = `<div style="text-align:center;font-size:20px;margin-bottom:12px;">${grade}</div>`;
  detail.innerHTML += `<div style="text-align:center;font-size:13px;color:#8d6e63;">完成 ${TOTAL} 题 · 正确 ${correctCount} · 错误 ${wrongCount} · 跳过 ${skipCount}</div>`;
}

function restartGame() {
  initGame();
}

// Hint toggle
document.getElementById('hintToggleBtn').addEventListener('click', () => {
  const box = document.getElementById('hintBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
});

// Start
initGame();
</script>
</body>
</html>
