<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>诗中有阵｜五关诗词小游戏</title>
  <style>
    :root{
      --bg1:#120c08; --bg2:#2d1b12; --paper:#f8efd8; --ink:#382319;
      --gold:#d9a441; --red:#9b2f24; --muted:#8b6f55; --green:#3d7b56;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; min-height:100svh; display:flex; align-items:center; justify-content:center;
      font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(217,164,65,.28), transparent 26%),
        radial-gradient(circle at 82% 6%, rgba(155,47,36,.22), transparent 24%),
        linear-gradient(145deg,var(--bg1),var(--bg2));
      padding:18px;
    }
    .app{width:min(720px,100%);}
    .card{
      position:relative; overflow:hidden; border-radius:28px; padding:22px;
      background:linear-gradient(180deg,rgba(248,239,216,.98),rgba(237,218,177,.96));
      box-shadow:var(--shadow); border:1px solid rgba(217,164,65,.45);
    }
    .card:before{content:"";position:absolute;inset:10px;border:1px solid rgba(120,72,33,.18);border-radius:22px;pointer-events:none}
    header{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; position:relative; z-index:1}
    h1{font-size:30px; margin:0 0 4px; letter-spacing:.1em; color:#3a1d14}
    .sub{font-size:14px; color:var(--muted)}
    .timer{
      min-width:92px; text-align:center; border-radius:18px; padding:9px 12px;
      background:rgba(58,29,20,.9); color:#fff4d8; box-shadow:0 8px 18px rgba(58,29,20,.18)
    }
    .timer b{display:block;font-size:28px;line-height:1}.timer span{font-size:12px;color:#e0c991}
    .bar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0 16px; position:relative; z-index:1}
    .level{font-weight:700; color:var(--red)}
    .hint{font-size:14px;color:var(--muted);text-align:right}
    .grid{
      display:grid; gap:8px; margin:0 auto 18px; position:relative; z-index:1;
      width:min(100%, 520px); aspect-ratio:1/1;
    }
    .cell,.slot{
      display:flex;align-items:center;justify-content:center; user-select:none; cursor:pointer;
      border-radius:14px; font-size:clamp(22px,7vw,38px); font-weight:700;
      background:rgba(255,250,235,.88); border:1px solid rgba(106,67,36,.18);
      box-shadow:inset 0 -3px 0 rgba(106,67,36,.08), 0 5px 14px rgba(58,29,20,.08);
      transition:.12s transform,.12s background,.12s color,.12s opacity;
    }
    .cell:active{transform:scale(.96)}
    .cell.used{opacity:.36; transform:scale(.95); pointer-events:none}
    .cell.wrong{animation:shake .24s; background:#f3c8bf;color:var(--red)}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .answer{display:grid; grid-template-columns:repeat(7,1fr); gap:7px; margin:0 auto 14px; width:min(100%,560px); position:relative; z-index:1}
    .slot{height:58px; font-size:clamp(22px,6vw,34px); background:#fff8e8; color:#28170f}
    .slot.empty{color:rgba(56,35,25,.26)}
    .actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; position:relative; z-index:1}
    button{
      border:0; border-radius:999px; padding:11px 18px; cursor:pointer; font-weight:700;
      font-family:inherit; font-size:15px; color:#fff8e8; background:var(--red);
      box-shadow:0 8px 20px rgba(155,47,36,.22);
    }
    button.secondary{background:#6e513d} button.ghost{background:transparent;color:#6e513d;border:1px solid rgba(110,81,61,.35);box-shadow:none}
    .msg{min-height:28px; text-align:center; margin-top:12px; color:var(--red); font-weight:700; position:relative; z-index:1}
    .overlay{position:absolute; inset:0; display:none; align-items:center; justify-content:center; padding:20px; background:rgba(35,19,12,.42); z-index:5; backdrop-filter:blur(3px)}
    .overlay.show{display:flex}.panel{width:min(520px,100%); border-radius:24px; padding:26px; text-align:center; background:#fff7e4; box-shadow:var(--shadow)}
    .panel h2{margin:0 0 10px;font-size:30px;color:#3a1d14}.panel p{line-height:1.8;color:#6e513d}.poem{font-size:24px;color:var(--red);font-weight:800;letter-spacing:.12em;margin:12px 0}
    @media(max-width:520px){body{padding:10px}.card{padding:18px 14px;border-radius:22px}h1{font-size:25px}.cell{border-radius:11px}.grid{gap:6px}.slot{height:48px;border-radius:11px}.timer{min-width:78px}.timer b{font-size:24px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <header>
        <div><h1>诗中有阵</h1><div class="sub">六十息内，于三十六格中寻得一句七言诗。</div></div>
        <div class="timer"><b id="time">60</b><span>倒计时</span></div>
      </header>
      <div class="bar"><div class="level" id="levelText">第一关 · 4×4</div><div class="hint" id="hintText">从字阵中按顺序点出诗句</div></div>
      <div class="grid" id="grid"></div>
      <div class="answer" id="answer"></div>
      <div class="actions">
        <button class="secondary" id="undoBtn">撤回一字</button>
        <button class="ghost" id="clearBtn">清空</button>
        <button id="restartBtn">重开本关</button>
      </div>
      <div class="msg" id="msg"></div>
      <div class="overlay show" id="overlay">
        <div class="panel">
          <h2 id="panelTitle">诗中有阵</h2>
          <p id="panelText">五关诗词小游戏。每关 6×6 三十六格，藏一句七言诗；干扰项取残缺诗句，按顺序点击文字填入下方七格。每关 60 秒。</p>
          <div class="poem" id="panelPoem"></div>
          <button id="panelBtn">开始闯关</button>
        </div>
      </div>
    </section>
  </main>
<script>
const levels = [
  {n:6, author:'黄庭坚', poem:'桃李春风一杯酒', decoys:['江湖夜雨十年','持家但有四立','治病不蕲三折']},
  {n:6, author:'李商隐', poem:'桐花万里丹山路', decoys:['雏凤清于老','小苑西回凤','上林花满枝']},
  {n:6, author:'陆游', poem:'楼船夜雪瓜洲渡', decoys:['铁马秋风大','塞上长城空','镜中衰鬓已']},
  {n:6, author:'秦观', poem:'自在飞花轻似梦', decoys:['无边丝雨细','宝帘闲挂小','芳心千里碎']},
  {n:6, author:'元好问', poem:'一语天然万古新', decoys:['豪华落尽见','南窗白日羲','未害渊明是']},
];
const fillers = '天地玄黄宇宙洪荒日月盈昃辰宿列张寒来暑往秋收冬藏云腾致雨露结为霜金生丽水玉出昆冈剑号巨阙珠称夜光果珍李柰菜重芥姜海咸河淡鳞潜羽翔龙师火帝鸟官人皇';
const gridEl = document.getElementById('grid'), answerEl = document.getElementById('answer'), timeEl = document.getElementById('time');
const levelText = document.getElementById('levelText'), hintText = document.getElementById('hintText'), msgEl = document.getElementById('msg');
const overlay = document.getElementById('overlay'), panelTitle = document.getElementById('panelTitle'), panelText = document.getElementById('panelText'), panelPoem = document.getElementById('panelPoem'), panelBtn = document.getElementById('panelBtn');
let level = 0, time = 60, timer = null, picked = [], cells = [], running = false;
function cnNum(i){return ['一','二','三','四','五','六','七','八','九'][i]}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildLetters(data, count){
  const arr = data.poem.split('');
  const fragments = Array.isArray(data.decoys) ? data.decoys : [data.decoy || ''];
  // 干扰字来自残缺诗句（5字、6字不等），避免整句答案感太强
  for(const frag of fragments){
    for(const ch of frag.split('')){ if(arr.length < count) arr.push(ch); }
  }
  let k = 0;
  while(arr.length < count) arr.push(fillers[k++ % fillers.length]);
  return shuffle(arr);
}
function startLevel(idx){
  level = idx; time = 60; picked = []; running = true; msg('');
  const data = levels[level], size = data.n, count = size*size;
  levelText.textContent = `第${cnNum(level)}关 · ${size}×${size} · ${data.author}`;
  hintText.textContent = `第 ${level+1}/5 关 · 作者不重复`;
  timeEl.textContent = time;
  gridEl.style.gridTemplateColumns = `repeat(${size},1fr)`;
  gridEl.innerHTML = ''; answerEl.innerHTML = '';
  cells = buildLetters(data, count).map((ch, i)=>({ch, i, used:false}));
  cells.forEach(c=>{
    const div = document.createElement('div'); div.className='cell'; div.textContent=c.ch; div.onclick=()=>pick(c.i, div); gridEl.appendChild(div); c.el=div;
  });
  for(let i=0;i<7;i++){const s=document.createElement('div');s.className='slot empty';s.textContent='·';s.onclick=()=>undoTo(i);answerEl.appendChild(s)}
  clearInterval(timer); timer = setInterval(tick,1000);
}
function tick(){if(!running)return; time--; timeEl.textContent=time; if(time<=0) fail();}
function pick(i, el){
  if(!running || picked.length>=7 || cells[i].used) return;
  cells[i].used=true; el.classList.add('used'); picked.push(i); renderAnswer();
  if(picked.length===7) check();
}
function renderAnswer(){[...answerEl.children].forEach((s,i)=>{if(i<picked.length){s.textContent=cells[picked[i]].ch;s.classList.remove('empty')}else{s.textContent='·';s.classList.add('empty')}})}
function answer(){return picked.map(i=>cells[i].ch).join('')}
function check(){
  const poem = levels[level].poem;
  if(answer()===poem){
    running=false; clearInterval(timer);
    if(level===levels.length-1) showWin(); else showPass(poem);
  }else{
    msg('诗意未成，扣五息。可撤回重选。'); time = Math.max(0, time-5); timeEl.textContent=time;
    picked.forEach(i=>{cells[i].el.classList.add('wrong'); setTimeout(()=>cells[i].el.classList.remove('wrong'),260)});
    if(time<=0) fail();
  }
}
function undo(){if(!picked.length||!running)return; const i=picked.pop(); cells[i].used=false; cells[i].el.classList.remove('used'); renderAnswer(); msg('')}
function undoTo(slot){if(!running || slot>=picked.length)return; while(picked.length>slot) undo();}
function clearPicked(){while(picked.length) undo();}
function msg(t){msgEl.textContent=t}
function fail(){running=false; clearInterval(timer); panelTitle.textContent='时辰已尽'; panelText.textContent='这一关未能成句，再来一次。'; panelPoem.textContent=levels[level].poem; panelBtn.textContent='重试本关'; panelBtn.onclick=()=>{overlay.classList.remove('show');startLevel(level)}; overlay.classList.add('show')}
function showPass(poem){panelTitle.textContent='过关'; panelText.textContent='寻得一句：'; panelPoem.textContent=poem; panelBtn.textContent='进入下一关'; panelBtn.onclick=()=>{overlay.classList.remove('show');startLevel(level+1)}; overlay.classList.add('show')}
function showWin(){panelTitle.textContent='五阵皆破'; panelText.textContent='岛上诗魁，今日登场。'; panelPoem.textContent=levels.map(x=>x.poem).join(' / '); panelBtn.textContent='再玩一次'; panelBtn.onclick=()=>{overlay.classList.remove('show');startLevel(0)}; overlay.classList.add('show')}
document.getElementById('undoBtn').onclick=undo; document.getElementById('clearBtn').onclick=clearPicked; document.getElementById('restartBtn').onclick=()=>startLevel(level);
panelBtn.onclick=()=>{overlay.classList.remove('show');startLevel(0)};
</script>
</body>
</html>
